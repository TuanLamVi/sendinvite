<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIỆP CƯỚI ONLINE</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/TuanLamVi/invite/main/favicon.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script&family=Caveat&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --wedding-pink: #d98cb3;
            --wedding-gold: #d4af37;
            --wedding-light: #fff5f8;
            --text-dark: #5a4a52;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #ffecd2, #fcb69f, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            position: relative;
            backdrop-filter: blur(10px);
        }
        .header-title {
            text-align: center;
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            color: var(--wedding-pink);
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .canvas-wrapper { position: relative; width: 100%; }
        canvas {
            width: 100%;
            display: block;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(217, 140, 179, 0.2);
            border: 3px solid white;
        }
        .external-input {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(217, 140, 179, 0.4);
            background: linear-gradient(135deg, #ffffff, var(--wedding-light));
            text-align: center;
            font-size: 15px;
            color: var(--wedding-pink);
            font-weight: 600;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 15px rgba(217, 140, 179, 0.15);
            transition: all 0.3s ease;
        }
        .external-input:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217, 140, 179, 0.25); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; display: none; z-index: 9998;
        }
        .overlay.active { display: block; }
        .popup {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px 20px;
            box-shadow: 0 -10px 40px rgba(217, 140, 179, 0.2); z-index: 9999;
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .popup.active { bottom: 25px; }
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .popup-title { font-size: 18px; font-weight: 700; color: var(--wedding-pink); display: flex; align-items: center; gap: 8px; }
        .close-btn {
            width: 34px; height: 34px; border: none; background: var(--wedding-light);
            color: var(--wedding-pink); border-radius: 50%; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .close-btn:hover { background: #ffe4ef; transform: rotate(90deg); }
        .section { margin-bottom: 15px; width: 100%; }
        .section-label { display: block; font-size: 11px; font-weight: 700; color: #8c7a82; margin-bottom: 6px; text-transform: uppercase; }
        input, select {
            width: 100%; padding: 12px 15px; border-radius: 15px; border: 1px solid #ebd4df;
            background: #fffcfd; font-size: 14px; outline: none; color: var(--text-dark); transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--wedding-pink); box-shadow: 0 0 0 3px rgba(217, 140, 179, 0.1); }
        .size-slider { background: #fffcfd; padding: 10px 15px; border-radius: 15px; border: 1px solid #ebd4df; display: flex; align-items: center; gap: 12px; }
        .size-slider input { flex: 1; accent-color: var(--wedding-pink); padding: 0; border: none; }
        #size-value { font-weight: 700; color: var(--wedding-pink); min-width: 30px; text-align: right; }
        .palette { display: flex; justify-content: space-between; gap: 5px; padding: 5px 0; }
        .color-dot { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.15); transition: 0.2s; }
        .color-dot:active { transform: scale(0.8); }
        .action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .btn { padding: 14px; border-radius: 20px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-download { background: linear-gradient(135deg, #e6c27a, #d4af37); color: #fff; }
        .btn-share { background: linear-gradient(135deg, #f3a183, #ec6f66); }
        .contact-footer { margin-top: 25px; padding: 20px; background: linear-gradient(to bottom, #ffffff, var(--wedding-light)); border-radius: 24px; text-align: center; box-shadow: 0 4px 15px rgba(217, 140, 179, 0.08); border: 1px solid rgba(217, 140, 179, 0.2); }
        .contact-title { font-weight: 600; color: var(--wedding-pink); font-size: 13px; text-transform: uppercase; margin-bottom: 15px; }
        .contact-row { display: flex; gap: 12px; }
        .contact-btn { flex: 1; background: white; border-radius: 18px; padding: 12px 5px; text-decoration: none; color: var(--text-dark); border: 1px solid #ebd4df; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .contact-btn:hover { border-color: var(--wedding-pink); transform: translateY(-3px); box-shadow: 0 8px 15px rgba(217, 140, 179, 0.15); }
        .contact-icon { font-size: 24px; line-height: 1; margin-bottom: 2px; }
        .contact-label { font-size: 11px; color: #8c7a82; }
        .contact-number { font-size: 14px; font-weight: 700; color: var(--wedding-pink); }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="hidePopup()"></div>

    <div class="container">
        
        <div class="header-title">Thiệp Mời Của Chúng Mình</div>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
        
        <input type="text" readonly class="external-input" 
               placeholder="✨ Chạm để viết tên khách mời ✨" 
               onclick="showPopup()">

        <div class="popup" id="popup">
            <div class="popup-header">
                <div class="popup-title">
                    <span style="font-size: 22px;">✍️</span> Viết Lời Mời
                </div>
                <button class="close-btn" onclick="hidePopup()">×</button>
            </div>
            
            <div class="section">
                <label class="section-label">Tên khách mời</label>
                <input type="text" id="text" placeholder="Ví dụ: Gia đình Bác Tám Tuyến">
            </div>
            
            <div class="section">
                <label class="section-label">Kiểu chữ nghệ thuật</label>
                <select id="font">
                    <option value="'Great Vibes'">Great Vibes (Cổ điển)</option>
                    <option value="'Dancing Script'">Dancing Script (Lãng mạn)</option>
                    <option value="'Caveat'">Caveat (Tự nhiên)</option>
                    <option value="'Be Vietnam Pro'">Be Vietnam Pro (Hiện đại)</option>
                </select>
            </div>
            
            <div class="section">
                <label class="section-label">Kích cỡ chữ: <span id="size-value">120</span></label>
                <div class="size-slider">
                    <input type="range" id="size" min="40" max="250" value="120">
                </div>
            </div>
            
            <div class="section">
                <label class="section-label">Màu sắc</label>
                <div class="palette" id="palette"></div>
            </div>
            
            <div class="action-group">
                <button class="btn btn-download" onclick="save()">📥 LƯU ẢNH</button>
                <button class="btn btn-share" onclick="share()">📤 GỬI THIỆP</button>
            </div>
        </div>

        <div class="contact-footer">
            <div class="contact-title">Hỗ Trợ Thiết Kế Thiệp</div>
            <div class="contact-row">
                <a href="tel:0984062140" class="contact-btn">
                    <span class="contact-icon">📞</span>
                    <span class="contact-label">Gọi điện ngay</span>
                    <span class="contact-number">0984 062 140</span>
                </a>
                <a href="https://zalo.me/0984062140" target="_blank" class="contact-btn">
                    <span class="contact-icon">💬</span>
                    <span class="contact-label">Nhắn tin Zalo</span>
                    <span class="contact-number">0984 062 140</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            imageUrl: "https://raw.githubusercontent.com/TuanLamVi/sinhnhat/main/thiepmau7.png",
            textX: 0.5,           
            textY: 0.152,         
            textAlign: "center",  
            shadowColor: "rgba(0,0,0,0.3)",
            shadowBlur: 8
        };

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const popup = document.getElementById("popup");
        const overlay = document.getElementById("overlay");
        const textInput = document.getElementById("text");
        const sizeSlider = document.getElementById("size");
        const sizeValue = document.getElementById("size-value");
        const fontSelect = document.getElementById("font");
        
        let color = "#5a4a52"; 

        let img = new Image();
        img.crossOrigin = "anonymous";
        img.src = CONFIG.imageUrl;
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            draw();
        };

        const colors = ["#5a4a52", "#d98cb3", "#d4af37", "#c0392b", "#2c3e50", "#ffffff"];
        const palette = document.getElementById("palette");
        colors.forEach(c => {
            let d = document.createElement("div");
            d.className = "color-dot";
            d.style.background = c;
            d.onclick = () => { color = c; draw(); };
            palette.appendChild(d);
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            const text = textInput.value.trim();
            if (text) {
                const fontSize = parseFloat(sizeSlider.value);
                ctx.fillStyle = color;
                ctx.font = `${fontSize}px ${fontSelect.value}`;
                ctx.textAlign = CONFIG.textAlign;
                ctx.textBaseline = "bottom";
                ctx.shadowColor = CONFIG.shadowColor;
                ctx.shadowBlur = CONFIG.shadowBlur;
                ctx.fillText(text, canvas.width * CONFIG.textX, canvas.height * CONFIG.textY);
                ctx.shadowBlur = 0;
            }
        }

        sizeSlider.oninput = () => { sizeValue.textContent = sizeSlider.value; draw(); };
        textInput.oninput = draw;
        fontSelect.onchange = draw;

        function showPopup() {
            popup.classList.add("active");
            overlay.classList.add("active");
            textInput.focus();
        }

        function hidePopup() {
            popup.classList.remove("active");
            overlay.classList.remove("active");
        }

        /* TẠO TÊN FILE TỰ ĐỘNG CHUẨN SEO/FILE SYSTEM */
        function generateFileName() {
            let text = textInput.value.trim();
            
            // Nếu chưa nhập tên gì thì lấy tên mặc định
            if (!text) return "thiep_cuoi_online.png";
            
            // 1. Đổi sang chữ thường
            text = text.toLowerCase();
            
            // 2. Xóa các dấu tiếng Việt (á, à, ả, ã, ạ, â, ă...)
            text = text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            // 3. Xử lý riêng chữ đ
            text = text.replace(/đ/g, "d");
            
            // 4. Biến tất cả các ký tự không phải chữ/số thành dấu gạch dưới "_"
            text = text.replace(/[^a-z0-9]/g, "_");
            
            // 5. Xóa các dấu gạch dưới liền nhau (ví dụ: "__" thành "_")
            text = text.replace(/_+/g, "_");
            
            // 6. Cắt bỏ dấu gạch dưới thừa ở đầu và cuối
            text = text.replace(/^_|_$/g, "");
            
            return text + ".png";
        }

        /* LƯU ẢNH (Đã áp dụng tạo tên file tự động) */
        function save() {
            const fileName = generateFileName();
            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = fileName; 
            a.click();
        }

        /* GỬI ẢNH (Đã áp dụng tạo tên file tự động) */
        async function share() {
            if (!navigator.share) return alert("Trình duyệt không hỗ trợ chia sẻ trực tiếp. Vui lòng bấm LƯU ẢNH.");
            try {
                const fileName = generateFileName();
                const blob = await (await fetch(canvas.toDataURL("image/png"))).blob();
                const file = new File([blob], fileName, { type: "image/png" });
                await navigator.share({ files: [file], title: "Thiệp Mời", text: "Trân trọng kính mời!" });
            } catch (e) {}
        }
    </script>
</body>
</html>
