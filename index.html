<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GỬI THIỆP ONLINE</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/TuanLamVi/invite/main/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/TuanLamVi/invite/main/favicon.png">
    <meta property="og:title" content="THIỆP MỜI ONLINE">
    <meta property="og:description" content="Gửi thiệp online giúp bạn tạo thiệp nhanh chóng, đẹp mắt chỉ trong một nốt nhạc.">
    <meta property="og:image" content="https://raw.githubusercontent.com/TuanLamVi/sendinvite/main/logo.jpg">
    <meta property="og:url" content="https://tuanlamvi.github.io/invite/">
  
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script&family=Caveat&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  
    <style>
        :root { --pink1: #ff9a9e; --pink3: #fbc2eb; }
        body { font-family: 'Be Vietnam Pro', sans-serif; margin: 0; background: linear-gradient(135deg, var(--pink1), var(--pink3)); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; background: white; border-radius: 22px; padding: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); position: relative; }
        .canvas-wrapper { position: relative; }
        canvas { width: 100%; border-radius: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .popup { position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(255, 255, 255, 0.38); backdrop-filter: blur(10px); border-radius: 16px; padding: 10px 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.15); display: none; z-index: 20; border: 1px solid rgba(255,255,255,0.5); }
        .popup.active { bottom: 62px; }
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .popup-title { font-size: 14.5px; font-weight: 600; color: #e91e63; }
        .close-btn { width: 34px; height: 34px; border: none; background: #ff1744; color: white; border-radius: 50%; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(255,23,68,0.3); }
        .section { margin-bottom: 7px; }
        .section-label { font-size: 11.5px; font-weight: 600; color: #e91e63; margin-bottom: 3px; }
        input, select { width: 100%; padding: 9px 11px; border-radius: 11px; border: 2px solid #f8c4d0; font-size: 14.8px; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: #e91e63; }
        .size-slider { background: rgba(248,248,248,0.9); padding: 7px 11px; border-radius: 11px; display: flex; align-items: center; gap: 9px; }
        .size-slider input[type="range"] { flex: 1; accent-color: #e91e63; }
        #size-value { font-weight: 700; font-size: 15.5px; min-width: 36px; text-align: center; color: #e91e63; }
        .palette { display: flex; justify-content: space-around; margin: 5px 0 3px 0; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; }
        button { padding: 11px; border-radius: 11px; border: none; font-weight: 600; font-size: 14.5px; cursor: pointer; }
        .btn-download { background: linear-gradient(135deg, #ff758c, #ff7eb3); color: white; }
        .btn-share { background: linear-gradient(135deg, #36d1dc, #5b86e5); color: white; }
        .contact-footer { margin-top: 26px; padding: 20px 18px; background: linear-gradient(135deg, #fff0f5, #ffe4f0); border-radius: 20px; border: 3px solid #ff9a9e; box-shadow: 0 8px 25px rgba(233, 30, 99, 0.22); text-align: center; }
        .contact-title { font-size: 14px; font-weight: 700; color: #e91e63; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; letter-spacing: 0.6px; }
        .contact-row { display: flex; gap: 12px; justify-content: center; }
        .contact-btn { flex: 1; max-width: 175px; background: white; border-radius: 16px; padding: 14px 12px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: #e91e63; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #f8c4d0; }
        .contact-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 25px rgba(233, 30, 99, 0.3); border-color: #ff9a9e; }
        .contact-btn .icon { font-size: 32px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(233, 30, 99, 0.2)); }
        .contact-btn div { text-align: left; }
        .contact-btn .label { font-size: 12.5px; font-weight: 600; opacity: 0.85; line-height: 1; }
        .contact-btn .number { font-size: 17px; font-weight: 700; line-height: 1.2; margin-top: 2px; }
        .contact-support { margin-top: 16px; font-size: 13px; color: #e91e63; opacity: 0.9; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        /* Hiệu ứng load trang chính */
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 22px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
        .loader-spin { border: 4px solid #fbc2eb; border-top: 4px solid #e91e63; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loader chờ lấy dữ liệu -->
        <div id="loader">
            <div class="loader-spin"></div>
            <div style="color:#e91e63; font-weight:bold; font-size: 14px;">Đang chuẩn bị thiệp...</div>
        </div>

        <div class="canvas-wrapper" id="wrapper">
            <canvas id="canvas"></canvas>
          
            <div class="popup" id="popup">
                <div class="popup-header">
                    <div class="popup-title">✏️ Chỉnh sửa thiệp</div>
                    <button class="close-btn" onclick="hidePopup()">×</button>
                </div>
              
                <div class="section">
                    <label class="section-label">NỘI DUNG</label>
                    <input type="text" id="text" placeholder="Nhập tên khách mời...">
                </div>
              
                <div class="section">
                    <label class="section-label">KIỂU CHỮ</label>
                    <select id="font">
                        <option value="'Great Vibes'">Great Vibes - Sang trọng</option>
                        <option value="'Dancing Script'">Dancing Script</option>
                        <option value="'Caveat'">Caveat - Viết tay</option>
                        <option value="'Be Vietnam Pro'">Be Vietnam Pro</option>
                        <option value="Arial">Arial</option>
                    </select>
                </div>
              
                <div class="section">
                    <label class="section-label">KÍCH THƯỚC CHỮ</label>
                    <div class="size-slider">
                        <input type="range" id="size" min="40" max="280" value="80" step="2">
                        <span id="size-value">80</span>
                    </div>
                </div>
              
                <div class="section">
                    <label class="section-label">MÀU CHỮ</label>
                    <div class="palette" id="palette"></div>
                </div>
              
                <div class="action-group">
                    <button class="btn-download" onclick="save()">📥 TẢI VỀ</button>
                    <button class="btn-share" onclick="share()">📤 GỬI</button>
                </div>
            </div>
        </div>
      
        <input type="text" placeholder="Bấm vào đây để chỉnh nội dung thiệp..."
               onclick="showPopup()" style="margin-top:12px; text-align:center; font-size:15px;">
        
        <div class="contact-footer">
            <div class="contact-title">
                ❤️ Liên hệ hỗ trợ ngay
            </div>
            <div class="contact-row">
                <a href="tel:0984062140" class="contact-btn">
                    <span class="icon">📱</span>
                    <div>
                        <span class="label">Hotline</span>
                        <strong class="number">0984 062 140</strong>
                    </div>
                </a>
                <a href="https://zalo.me/0984062140" target="_blank" class="contact-btn" rel="noopener">
                    <span class="icon">💬</span>
                    <div>
                        <span class="label">Zalo</span>
                        <strong class="number">0984 062 140</strong>
                    </div>
                </a>
            </div>
            <div class="contact-support">
                Hỗ trợ 24/7 • Tạo thiệp chỉ trong 10 giây ✨
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxWK9rCRVGoGSehVxMIxy_68_OwacwKiQyn8qgDcXgd_xB45jdwZJQAGM3zBwFLFFASjg/exec";

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const popup = document.getElementById("popup");
        const wrapper = document.getElementById("wrapper");
        const textInput = document.getElementById("text");
        const sizeSlider = document.getElementById("size");
        const sizeValue = document.getElementById("size-value");
        const fontSelect = document.getElementById("font");
        const palette = document.getElementById("palette");

        // Cấu hình mặc định phòng hờ
        let activeConfig = { 
            imageUrl: "https://raw.githubusercontent.com/TuanLamVi/sinhnhat/main/thiepmau7.png", 
            textPosition: { x: 0.5, y: 0.152 },
            defaultFontSize: 80
        };

        let img = new Image();
        img.crossOrigin = "anonymous";

        // ==================== KÉO DỮ LIỆU TỪ GOOGLE SHEET ====================
        const urlParams = new URLSearchParams(window.location.search);
        const templateId = urlParams.get('id');

        if (templateId) {
            fetch(API_URL + "?action=read&id=" + templateId)
                .then(res => res.json())
                .then(data => {
                    if (!data.error) {
                        activeConfig = {
                            imageUrl: data.imageUrl,
                            textPosition: { x: parseFloat(data.x), y: parseFloat(data.y) },
                            defaultFontSize: parseInt(data.fontSize) || 80
                        };
                    }
                    initCanvas();
                })
                .catch(err => {
                    initCanvas(); // Lỗi mạng thì load mặc định
                });
        } else {
            initCanvas(); // Không có ID thì load mặc định
        }

        // ==================== KHỞI TẠO BẢN VẼ ====================
        function initCanvas() {
            // Gán cỡ chữ mặc định
            sizeSlider.value = activeConfig.defaultFontSize;
            sizeValue.textContent = activeConfig.defaultFontSize;
            
            img.src = activeConfig.imageUrl;
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                draw();
                // Ẩn bảng chờ tải
                document.getElementById('loader').style.display = 'none';
            };
            img.onerror = () => {
                alert("Ảnh bị lỗi không tải được. Vui lòng kiểm tra lại đường link ảnh!");
                document.getElementById('loader').style.display = 'none';
            }
        }

        // ==================== XỬ LÝ MÀU VÀ VẼ ====================
        let currentColor = "#000000";
        const colors = ["#000000", "#e91e63", "#9c27b0", "#3f51b5", "#d81b60", "#ff5722", "#ffffff"];
        
        colors.forEach(c => {
            let d = document.createElement("div");
            d.className = "color-dot";
            d.style.background = c;
            d.onclick = () => { currentColor = c; draw(); };
            palette.appendChild(d);
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);

            const text = textInput.value.trim();
            if (text) {
                const fontSize = parseFloat(sizeSlider.value);
                ctx.fillStyle = currentColor;
                ctx.font = `${fontSize}px ${fontSelect.value}`;
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";

                const textX = canvas.width * activeConfig.textPosition.x;
                const textY = canvas.height * activeConfig.textPosition.y;

                ctx.shadowColor = "rgba(0,0,0,0.45)";
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 3;

                ctx.fillText(text, textX, textY);

                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }
        }

        // ==================== SỰ KIỆN GIAO DIỆN ====================
        sizeSlider.addEventListener("input", () => {
            sizeValue.textContent = sizeSlider.value;
            draw();
        });
        textInput.addEventListener("input", draw);
        fontSelect.addEventListener("change", draw);

        function showPopup() {
            popup.style.display = "block";
            setTimeout(() => popup.classList.add("active"), 10);
            textInput.focus();
        }

        function hidePopup() {
            popup.classList.remove("active");
            setTimeout(() => { popup.style.display = "none"; }, 300);
        }

        wrapper.addEventListener("click", (e) => {
            if (e.target === wrapper || e.target === canvas) { hidePopup(); }
        });

        // ==================== TẢI XUỐNG & CHIA SẺ ====================
        function getFileName() {
            const guestName = textInput.value.trim();
            if (guestName) {
                const cleanName = guestName.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "_");
                return `thiep_moi_${cleanName}.png`;
            }
            return "thiep_moi.png";
        }

        function save() {
            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = getFileName();
            a.click();
        }

        async function share() {
            if (!navigator.share) {
                return alert("Có lỗi trong tính năng chia sẻ, vui lòng bấm vào nút 3 chấm trên cùng bên phải và chọn 'Mở bàng trình duyệt' để tiếp tục");
            }
            try {
                const blob = await (await fetch(canvas.toDataURL("image/png"))).blob();
                const file = new File([blob], getFileName(), { type: "image/png" });
                await navigator.share({ files: [file] });
            } catch (e) {}
        }
    </script>
</body>
</html>
