<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Mẫu Thiệp</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: #e91e63; text-align: center; }
        
        .template-list { margin-bottom: 30px; border-bottom: 2px solid #fbc2eb; padding-bottom: 20px; }
        .template-item { background: #fff0f5; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #fbc2eb; }
        .template-info { flex: 1; }
        .template-note { font-weight: bold; font-size: 16px; color: #d81b60; margin-bottom: 5px; }
        .template-id { font-size: 12px; color: #888; }
        .template-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;}
        
        .edit-section { background: #fafafa; padding: 20px; border-radius: 8px; border: 1px dashed #ccc; display: none; }
        .form-group { margin-bottom: 15px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #e91e63; }
        input[type="text"] { width: 100%; padding: 10px; border: 2px solid #fbc2eb; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        button { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-primary { background: #e91e63; color: white; }
        .btn-primary:hover { background: #d81b60; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:hover { background: #45a049; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .btn-info { background: #2196F3; color: white; }
        .btn-upload { background: linear-gradient(135deg, #36d1dc, #5b86e5); color: white; width: 100%; padding: 14px; font-size: 16px; margin-bottom: 10px; }
        
        canvas { width: 100%; border: 2px dashed #ccc; border-radius: 8px; cursor: crosshair; margin-top: 10px; }
        .note { font-size: 13px; color: #666; margin-top: 5px; }
        #uploadStatus { text-align: center; color: #e91e63; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ TRANG QUẢN TRỊ THIỆP</h1>
        
        <div class="template-list">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h2 style="margin: 0;">Danh sách thiệp của bạn</h2>
                <button class="btn-primary" onclick="openCreateForm()" style="padding: 10px 20px; font-size: 16px;">+ KHỞI TẠO THIỆP MỚI</button>
            </div>
            <div id="listContainer"></div>
        </div>

        <div class="edit-section" id="editSection">
            <h2 id="formTitle">Tạo Mẫu Thiệp Mới</h2>
            <input type="hidden" id="currentId">
            
            <div class="form-group">
                <label>✏️ Ghi chú (Ví dụ: Thiệp cưới Hùng & Mai):</label>
                <input type="text" id="noteInput" placeholder="Nhập ghi chú để dễ nhớ...">
            </div>

            <div class="form-group">
                <label>🖼️ Ảnh nền thiệp mời:</label>
                
                <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="uploadImage(this)">
                <button type="button" class="btn-upload" onclick="document.getElementById('imageUpload').click()">
                    📤 BẤM TẢI ẢNH TỪ ĐIỆN THOẠI / MÁY TÍNH
                </button>
                <div id="uploadStatus">⏳ Đang tự động tải ảnh lên hệ thống, vui lòng chờ...</div>

                <div style="text-align: center; color: #888; font-size: 12px; margin: 10px 0;">- HOẶC DÁN LINK VÀO DƯỚI ĐÂY NẾU ĐÃ CÓ -</div>
                
                <input type="text" id="imgUrl" placeholder="Link ảnh tự động xuất hiện ở đây...">
                <button type="button" class="btn-success" onclick="loadImage()" style="margin-top: 10px;">Cập nhật ảnh để xem trước</button>
            </div>

            <div class="form-group">
                <label>🎯 Click trực tiếp vào ảnh bên dưới để chọn vị trí chữ:</label>
                <div class="note">Toạ độ X: <span id="valX" style="font-weight:bold;color:#e91e63">0.5</span> | Toạ độ Y: <span id="valY" style="font-weight:bold;color:#e91e63">0.152</span></div>
                <canvas id="previewCanvas"></canvas>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" onclick="saveTemplate()" style="flex: 1; padding: 12px;">💾 LƯU MẪU THIỆP NÀY</button>
                <button onclick="closeForm()" style="padding: 12px; background: #ccc; color: black;">Huỷ bỏ</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // BƯỚC QUAN TRỌNG: DÁN API KEY CỦA IMGBB VÀO GIỮA 2 DẤU NGOẶC KÉP Ở DƯỚI
        const IMGBB_API_KEY = "1979b11aff73d714c00eb24d8455b798"; 
        // =========================================================

        const DB_KEY = "myInviteManager";
        let templates = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        let currentImg = new Image();
        currentImg.crossOrigin = "anonymous";
        let tempPosition = { x: 0.5, y: 0.152 };

        // Xử lý tự động up ảnh từ điện thoại lên ImgBB
        async function uploadImage(input) {
            const file = input.files[0];
            if (!file) return;

            if(IMGBB_API_KEY === "1979b11aff73d714c00eb24d8455b798") {
                alert("Bạn chưa nhập API Key của ImgBB. Vui lòng xem lại mã code!");
                return;
            }

            const statusText = document.getElementById('uploadStatus');
            statusText.style.display = 'block';
            statusText.innerText = '⏳ Đang tự động tải ảnh lên hệ thống, vui lòng chờ...';

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('imgUrl').value = data.data.url;
                    statusText.innerText = '✅ Tải ảnh thành công!';
                    setTimeout(() => statusText.style.display = 'none', 3000);
                    loadImage(); // Hiện ảnh lên màn hình để chấm tọa độ
                } else {
                    statusText.innerText = '❌ Lỗi tải ảnh: ' + data.error.message;
                }
            } catch (error) {
                statusText.innerText = '❌ Lỗi kết nối mạng, vui lòng thử lại!';
            }
        }

        // --- CÁC HÀM CŨ GIỮ NGUYÊN (Không ảnh hưởng đến luồng hoạt động) ---
        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            
            const keys = Object.keys(templates);
            if (keys.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">Bạn chưa có mẫu thiệp nào. Hãy bấm "Khởi tạo thiệp mới".</p>';
                return;
            }

            keys.sort((a, b) => b - a).forEach(id => {
                const tpl = templates[id];
                const baseUrl = window.location.href.split('setup.html')[0];
                const params = new URLSearchParams({ img: tpl.imageUrl, x: tpl.textPosition.x, y: tpl.textPosition.y });
                const finalLink = `${baseUrl}index.html?${params.toString()}`;

                const div = document.createElement('div');
                div.className = 'template-item';
                div.innerHTML = `
                    <div class="template-info">
                        <div class="template-note">${tpl.note || "Không có ghi chú"}</div>
                        <div class="template-id">Ngày tạo: ${new Date(parseInt(id)).toLocaleString('vi-VN')}</div>
                    </div>
                    <div class="template-actions">
                        <button class="btn-info" onclick="copyLink('${finalLink}')">🔗 Copy Link Khách</button>
                        <button class="btn-warning" onclick="editTemplate('${id}')">✏️ Sửa</button>
                        <button class="btn-danger" onclick="deleteTemplate('${id}')">🗑️ Xoá</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openCreateForm() {
            document.getElementById('editSection').style.display = 'block';
            document.getElementById('formTitle').innerText = '✨ Khởi Tạo Mẫu Thiệp Mới';
            document.getElementById('currentId').value = '';
            document.getElementById('noteInput').value = '';
            document.getElementById('imgUrl').value = '';
            tempPosition = { x: 0.5, y: 0.152 };
            updateCoordsDisplay();
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Xóa canvas trắng
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function editTemplate(id) {
            const tpl = templates[id];
            document.getElementById('editSection').style.display = 'block';
            document.getElementById('formTitle').innerText = '✏️ Chỉnh Sửa Mẫu Thiệp';
            document.getElementById('currentId').value = id;
            document.getElementById('noteInput').value = tpl.note;
            document.getElementById('imgUrl').value = tpl.imageUrl;
            tempPosition = { x: tpl.textPosition.x, y: tpl.textPosition.y };
            updateCoordsDisplay();
            loadImage();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function closeForm() { document.getElementById('editSection').style.display = 'none'; }

        function loadImage() {
            if(!document.getElementById('imgUrl').value) return;
            currentImg.src = document.getElementById('imgUrl').value;
            currentImg.onload = () => {
                canvas.width = currentImg.width;
                canvas.height = currentImg.height;
                drawPreview();
            };
        }

        function drawPreview() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImg, 0, 0);
            const textX = canvas.width * tempPosition.x;
            const textY = canvas.height * tempPosition.y;
            ctx.fillStyle = "#e91e63"; ctx.font = "80px 'Be Vietnam Pro', sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "bottom";
            ctx.fillText("Tên Mẫu", textX, textY);
            ctx.fillStyle = "blue"; ctx.beginPath(); ctx.arc(textX, textY, 6, 0, Math.PI * 2); ctx.fill();
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            tempPosition.x = parseFloat(((e.clientX - rect.left) * (canvas.width / rect.width) / canvas.width).toFixed(3));
            tempPosition.y = parseFloat(((e.clientY - rect.top) * (canvas.height / rect.height) / canvas.height).toFixed(3));
            updateCoordsDisplay();
            drawPreview();
        });

        function updateCoordsDisplay() { document.getElementById('valX').innerText = tempPosition.x; document.getElementById('valY').innerText = tempPosition.y; }

        function saveTemplate() {
            const id = document.getElementById('currentId').value || Date.now().toString(); 
            const note = document.getElementById('noteInput').value || "Thiệp không tên";
            const imageUrl = document.getElementById('imgUrl').value;
            if(!imageUrl) return alert("Vui lòng tải ảnh lên hoặc dán link ảnh!");

            templates[id] = { id, note, imageUrl, textPosition: { ...tempPosition } };
            localStorage.setItem(DB_KEY, JSON.stringify(templates));
            alert('Đã lưu thành công!');
            closeForm();
            renderList();
        }

        function deleteTemplate(id) {
            if(confirm("Bạn có chắc chắn muốn xoá mẫu thiệp này không?")) {
                delete templates[id];
                localStorage.setItem(DB_KEY, JSON.stringify(templates));
                renderList();
            }
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                alert("Đã copy link! Bạn có thể dán (Paste) để gửi cho khách.\n\nLink đã copy:\n" + link);
            }).catch(err => { prompt("Hãy copy thủ công link sau:", link); });
        }

        renderList();
    </script>
</body>
</html>
